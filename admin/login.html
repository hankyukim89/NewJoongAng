<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 로그인 — 밴쿠버 중앙일보</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-page">

  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-ko">밴쿠버 중앙일보</div>
        <div class="logo-en">VANCOUVER JOONGANG ILBO</div>
      </div>

      <h2 class="login-title">관리자 로그인</h2>

      <div class="login-field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>

      <button class="btn-login" onclick="doLogin()">로그인</button>
      <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>

      <div class="login-hint">기본 비밀번호: <strong>admin123</strong><br><span style="font-size:12px;color:#999">js/data.js 에서 변경하세요</span></div>

      <a href="../index.html" class="back-link">← 사이트로 돌아가기</a>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script>
    // Already logged in? Go straight to dashboard
    if (VJ.isAdmin()) window.location.href = 'dashboard.html';

    function doLogin() {
      const pw  = document.getElementById('password').value;
      const err = document.getElementById('login-error');
      if (VJ.login(pw)) {
        window.location.href = 'dashboard.html';
      } else {
        err.style.display = 'block';
        document.getElementById('password').focus();
      }
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
